name: Safety PR Tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: safety-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  safety-tests:
    name: Safety Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Run safety test suite
        env:
          HAYSTACK_TELEMETRY_ENABLED: "False"
        run: bash ./scripts/run-tests.sh --safety

      - name: Upload safety test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-test-reports
          path: reports/test-run/
          if-no-files-found: ignore
