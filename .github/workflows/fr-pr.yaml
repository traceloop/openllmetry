name: FR PR Tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: fr-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fr-tests:
    name: FR Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "poetry"
          cache-dependency-path: |
            pyproject.toml
            poetry.lock
            packages/**/pyproject.toml
            packages/**/poetry.lock

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Run FR-marked test suite
        env:
          HAYSTACK_TELEMETRY_ENABLED: "False"
        run: bash ./scripts/run-tests.sh --fr

      - name: Upload FR test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fr-test-reports-py${{ matrix.python-version }}
          path: reports/test-run/
          if-no-files-found: ignore
