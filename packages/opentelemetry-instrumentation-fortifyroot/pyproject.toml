[project]
name = "opentelemetry-instrumentation-fortifyroot"
version = "0.52.6"
description = "Shared FortifyRoot safety hook helpers for OpenLLMetry"
authors = [
  { name = "Gal Kleinman", email = "gal@traceloop.com" },
  { name = "Nir Gazit", email = "nir@traceloop.com" },
  { name = "Tomer Friedman", email = "tomer@traceloop.com" },
]
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.10,<4"
dependencies = [
  "opentelemetry-api>=1.38.0,<2",
]

[project.urls]
Repository = "https://github.com/traceloop/openllmetry/tree/main/packages/opentelemetry-instrumentation-fortifyroot"

[dependency-groups]
dev = [
  "autopep8>=2.2.0,<3",
  "pytest>=8.2.2,<9",
  "ruff>=0.4.0",
]
test = [
  "opentelemetry-sdk>=1.38.0,<2",
  "pytest>=8.2.2,<9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["opentelemetry"]

[tool.coverage.run]
branch = true
source = ["opentelemetry/instrumentation/fortifyroot"]

[tool.coverage.report]
exclude_lines = ["if TYPE_CHECKING:"]
show_missing = true

[tool.ruff]
line-length = 120
exclude = [
  ".git",
  "__pycache__",
  "build",
  "dist",
  ".venv",
  ".pytest_cache",
]

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.pytest.ini_options]
markers = [
  "safety: safety-focused tests",
]

[tool.uv]
constraint-dependencies = ["urllib3>=2.6.3", "pip>=25.3"]
